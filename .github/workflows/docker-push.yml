name: Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u checkoutreceipt --password-stdin

      - name: Build image
        run: docker build -t checkoutreceipt/checkoutreceipt-tax-codes .

      - name: Push image
        run: docker push checkoutreceipt/checkoutreceipt-tax-codes
